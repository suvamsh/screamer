name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: macos-14
    env:
      CARGO_TERM_COLOR: always
      GGML_NATIVE: OFF
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: brew install cmake

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked --workspace --all-targets

  macos-bundle-smoke:
    runs-on: macos-14
    env:
      CARGO_TERM_COLOR: always
      GGML_NATIVE: OFF
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: brew install cmake

      - name: Build universal macOS binaries
        run: |
          cargo build --locked --release --target aarch64-apple-darwin
          cargo build --locked --release --target x86_64-apple-darwin
          mkdir -p target/universal/release
          for bin in screamer screamer_summary_helper screamer_tts_helper screamer_vision_helper; do
            arm="target/aarch64-apple-darwin/release/$bin"
            x86="target/x86_64-apple-darwin/release/$bin"
            if [ -f "$arm" ] && [ -f "$x86" ]; then
              lipo -create "$arm" "$x86" -output "target/universal/release/$bin"
              lipo -info "target/universal/release/$bin"
            fi
          done

      - name: Smoke test macOS app bundle
        env:
          BIN_PATH: target/universal/release/screamer
          SUMMARY_HELPER_PATH: target/universal/release/screamer_summary_helper
          TTS_HELPER_PATH: target/universal/release/screamer_tts_helper
          VISION_HELPER_PATH: target/universal/release/screamer_vision_helper
        run: ./scripts/macos_bundle_smoke.sh
